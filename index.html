<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteBook LM 簡報製作風格專用 Prompt 自動生成器</title>
    <style>
        :root {
            --bg-deep:    #0D0E12;
            --bg-card:    #1A202C;
            --bg-surface: #11141D;
            --border:     #2D3748;
            --border-dim: #232936;
            --accent:     #00E5FF;
            --accent2:    #007BFF;
            --text:       #E2E8F0;
            --text-sub:   #A0AEC0;
            --text-input: #EDF2F7;
            --success:    #38A169;
            --success-h:  #48BB78;
            --danger:     #E53E3E;
            --radius-md:  10px;
            --radius-lg:  14px;
            --shadow-card: 0 4px 12px rgba(0,0,0,0.35);
            --glow:        0 0 10px rgba(0,229,255,0.25);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: var(--bg-deep);
            color: var(--text);
            padding: 24px 16px 48px;
            min-height: 100vh;
        }

        /* ── 主容器 ── */
        .主容器 {
            max-width: 1200px;
            margin: auto;
            background: var(--bg-surface);
            padding: 36px 40px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-dim);
            box-shadow: 0 12px 48px rgba(0,0,0,0.75);
        }

        /* ── 標題區 ── */
        .頁首 { text-align: center; margin-bottom: 32px; }
        .頁首 h1 {
            color: var(--accent);
            font-size: clamp(18px, 2.4vw, 26px);
            letter-spacing: 1.5px;
            padding-bottom: 16px;
            border-bottom: 1.5px solid var(--border-dim);
        }
        .頁首 .副標 {
            margin-top: 8px;
            font-size: 13px;
            color: var(--text-sub);
            letter-spacing: 0.5px;
        }

        /* ── 版本徽章 ── */
        .版本徽章 {
            display: inline-block;
            background: rgba(0,229,255,0.1);
            border: 1px solid rgba(0,229,255,0.3);
            color: var(--accent);
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 10px;
            vertical-align: middle;
            letter-spacing: 0.5px;
        }

        /* ── 表單卡片 ── */
        .表單卡片 {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 24px;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.2s;
            box-shadow: var(--shadow-card);
        }
        .表單卡片:hover {
            border-color: var(--accent);
            box-shadow: 0 6px 20px rgba(0,229,255,0.12);
            transform: translateY(-2px);
        }

        /* ── 區域網格 ── */
        .區域網格 { display: flex; flex-direction: column; gap: 18px; margin-bottom: 20px; }
        .兩欄並列 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .四欄並列 { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; }
        .組員排版 { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; margin-top: 12px; }

        /* ── 區塊標題 ── */
        .區塊標題 {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-dim);
        }

        /* ── 欄位標籤 ── */
        label {
            display: block;
            font-weight: bold;
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .選填標記 {
            font-size: 11px;
            font-weight: normal;
            color: var(--text-sub);
            margin-left: 4px;
        }

        /* ── 輸入元件 ── */
        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #374151;
            border-radius: 8px;
            background: var(--bg-deep);
            color: var(--text-input);
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.25s, box-shadow 0.25s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: var(--glow);
        }
        textarea { height: 130px; resize: vertical; line-height: 1.7; }

        /* ── 數字步進器 ── */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type="number"] { -moz-appearance: textfield; }

        .數字容器 { display: flex; align-items: center; gap: 10px; }
        .數字控制組 {
            display: flex;
            align-items: stretch;
            flex: 1;
            border: 1px solid #374151;
            border-radius: 8px;
            overflow: hidden;
            height: 44px;
            background: var(--bg-deep);
        }
        .數字控制組 input {
            border: none;
            border-radius: 0;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: var(--accent);
            padding: 0;
            background: transparent;
        }
        .數字控制組 input:focus { outline: none; box-shadow: none; }
        .調整鈕 {
            background: #232936;
            color: var(--text);
            border: none;
            width: 42px;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            flex-shrink: 0;
        }
        .調整鈕:hover { background: var(--accent); color: var(--bg-deep); }
        .單位標示 { color: var(--text-sub); font-size: 13px; font-weight: bold; white-space: nowrap; }

        /* ── 組員輸入 ── */
        .組員輸入 { font-size: 13px; }

        /* ── 風格預覽條 ── */
        .風格預覽條 {
            margin-top: 10px;
            height: 4px;
            border-radius: 4px;
            background: linear-gradient(90deg, var(--accent2), var(--accent));
            transition: background 0.5s;
        }

        /* ── 進階設定摺疊區 ── */
        .摺疊按鈕 {
            display: flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: 1px dashed var(--border);
            border-radius: 8px;
            color: var(--text-sub);
            font-size: 13px;
            padding: 10px 16px;
            cursor: pointer;
            width: 100%;
            transition: border-color 0.2s, color 0.2s;
        }
        .摺疊按鈕:hover { border-color: var(--accent); color: var(--accent); }
        .摺疊內容 { display: none; margin-top: 16px; }
        .摺疊內容.展開 { display: block; }
        .箭頭圖示 { transition: transform 0.25s; }
        .箭頭圖示.旋轉 { transform: rotate(180deg); }

        /* ── 輸出選項 tabs ── */
        .輸出模式列 {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .模式鈕 {
            flex: 1;
            padding: 9px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-deep);
            color: var(--text-sub);
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .模式鈕.啟用 {
            border-color: var(--accent);
            background: rgba(0,229,255,0.08);
            color: var(--accent);
        }
        .模式鈕:hover { border-color: var(--accent); color: var(--accent); }

        /* ── 啟動按鈕 ── */
        .啟動按鈕 {
            width: 100%;
            padding: 17px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: var(--bg-deep);
            border: none;
            border-radius: var(--radius-md);
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }
        .啟動按鈕:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,229,255,0.45); }
        .啟動按鈕:active { transform: translateY(0); }
        .啟動按鈕.載入中 { opacity: 0.7; pointer-events: none; }

        /* ── 色調面板 ── */
        .色調面板 {
            display: none;
            align-items: center;
            gap: 14px;
            background: var(--bg-card);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            margin-top: 18px;
            flex-wrap: wrap;
        }
        .色調面板.顯示 { display: flex; }
        .色調標題 { font-size: 13px; font-weight: bold; color: var(--text); white-space: nowrap; }
        .色調膠囊 {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #374151;
            border-radius: 24px;
            padding: 8px 20px;
            background: rgba(13,14,18,0.8);
        }
        .發光圓點 { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
        .色調文字 { font-size: 15px; font-weight: bold; color: #7DD3FC; letter-spacing: 1px; }

        /* ── 輸出區塊 ── */
        .輸出包裹器 {
            display: none;
            position: relative;
            margin-top: 24px;
        }
        .輸出包裹器.顯示 { display: block; }

        .輸出工具列 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0a0b0e;
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            padding: 10px 16px;
            gap: 10px;
        }
        .輸出工具列 .標籤群 {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .輸出圓點 { width: 12px; height: 12px; border-radius: 50%; }
        .字數標示 { font-size: 12px; color: var(--text-sub); }

        .按鈕群 { display: flex; gap: 8px; }
        .功能鈕 {
            padding: 7px 16px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-card);
            color: var(--text);
        }
        .功能鈕:hover { border-color: var(--accent); color: var(--accent); }
        .功能鈕.複製 { background: var(--success); border-color: var(--success); color: #fff; }
        .功能鈕.複製:hover { background: var(--success-h); border-color: var(--success-h); }
        .功能鈕.複製.成功 { background: var(--accent2); border-color: var(--accent2); }

        .內容輸出區 {
            background: #07080B;
            color: #A0AEC0;
            padding: 24px 28px;
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            white-space: pre-wrap;
            font-family: 'Consolas', 'Cascadia Code', 'Courier New', monospace;
            font-size: 14px;
            border: 1px solid var(--border);
            line-height: 1.65;
            max-height: 600px;
            overflow-y: auto;
        }

        /* 捲軸美化 */
        .內容輸出區::-webkit-scrollbar { width: 6px; }
        .內容輸出區::-webkit-scrollbar-track { background: transparent; }
        .內容輸出區::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

        /* ── 語法高亮 ── */
        .hl-key   { color: #7DD3FC; }
        .hl-val   { color: #86EFAC; }
        .hl-head  { color: var(--accent); font-weight: bold; }
        .hl-sep   { color: #6B7280; }
        .hl-str   { color: #FDE68A; }

        /* ── 提示訊息 ── */
        .提示條 {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-top: 12px;
        }
        .提示條.錯誤 { background: rgba(229,62,62,0.1); border: 1px solid rgba(229,62,62,0.3); color: #FC8181; }
        .提示條.成功 { background: rgba(56,161,105,0.1); border: 1px solid rgba(56,161,105,0.3); color: #68D391; }
        .提示條.顯示 { display: flex; }

        /* ── 進度條動畫 ── */
        @keyframes 進度掃描 {
            0%   { left: -40%; width: 40%; }
            100% { left: 100%; width: 40%; }
        }
        .進度條包裹 { height: 3px; background: var(--border-dim); border-radius: 3px; overflow: hidden; display: none; }
        .進度條包裹.活躍 { display: block; }
        .進度條指示 {
            position: relative;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: 進度掃描 1.2s ease-in-out infinite;
        }

        /* ── RWD ── */
        @media (max-width: 1024px) {
            .主容器 { padding: 28px 24px; }
            .四欄並列 { grid-template-columns: 1fr 1fr; }
            .組員排版 { grid-template-columns: repeat(3,1fr); }
        }
        @media (max-width: 768px) {
            .主容器 { padding: 20px 16px; }
            .四欄並列, .兩欄並列 { grid-template-columns: 1fr; }
            .組員排版 { grid-template-columns: 1fr 1fr; }
            .輸出模式列 { flex-wrap: wrap; }
        }
        @media (max-width: 480px) {
            .組員排版 { grid-template-columns: 1fr; }
            .按鈕群 { flex-wrap: wrap; }
            h1 { font-size: 16px; }
        }

        /* ── 欄位有值高亮 ── */
        input:not(:placeholder-shown),
        select:not([value=""]),
        textarea:not(:placeholder-shown) {
            border-color: #374151;
        }

        /* ── 字數提示 ── */
        .字數提示 {
            text-align: right;
            font-size: 11px;
            color: var(--text-sub);
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="主容器">

    <!-- 頁首 -->
    <div class="頁首">
        <h1>NoteBook LM 簡報製作風格專用 Prompt 自動生成器 <span class="版本徽章">v2.0</span></h1>
        <div class="副標">填寫以下欄位，系統將自動演算生成最佳化視覺提示詞</div>
    </div>

    <div class="區域網格">

        <!-- 區塊一：主題 & 風格 -->
        <div class="表單卡片">
            <div class="區塊標題">基礎設定</div>
            <div class="兩欄並列">
                <div>
                    <label>報告核心主題 <span class="選填標記">(選填)</span></label>
                    <input type="text" id="輸入主題" placeholder="例：智慧科技導入與營運策略報告" value="智慧科技導入與營運策略報告" oninput="即時預覽()">
                </div>
                <div>
                    <label>視覺風格</label>
                    <select id="選擇風格" onchange="即時預覽()">
                        <option value="自動判定">🤖 自動判別（依主題關鍵字匹配，未匹配套用 3D 擬真沉浸渲染）</option>
                        <optgroup label="── 商業 / 科技 ──">
                            <option value="金融科技信任">金融科技信任</option>
                            <option value="現代菁英商務">現代菁英商務</option>
                            <option value="暗黑霓虹科技">暗黑霓虹科技</option>
                            <option value="智慧科技藍工業安全">智慧科技藍工業安全</option>
                            <option value="數據流光．智造核心">數據流光．智造核心</option>
                        </optgroup>
                        <optgroup label="── 3D / 電影 ──">
                            <option value="3D 擬真沉浸渲染">3D 擬真沉浸渲染</option>
                            <option value="3D 等角微縮幾何">3D 等角微縮幾何</option>
                            <option value="3D 立體擬真電影">3D 立體擬真電影</option>
                            <option value="晶澈凝光．幻境稜鏡">晶澈凝光．幻境稜鏡</option>
                        </optgroup>
                        <optgroup label="── 藝術 / 人文 ──">
                            <option value="溫暖大地人文">溫暖大地人文</option>
                            <option value="嚴謹學術期刊">嚴謹學術期刊</option>
                            <option value="復古打字機報紙">復古打字機報紙</option>
                            <option value="莫蘭迪藝術策展">莫蘭迪藝術策展</option>
                            <option value="普普藝術漫畫">普普藝術漫畫</option>
                            <option value="千禧 Y2K 潮流">千禧 Y2K 潮流</option>
                            <option value="黑曜鎏金．尊榮典藏">黑曜鎏金．尊榮典藏</option>
                            <option value="時光燼卷．古韻滄桑">時光燼卷．古韻滄桑</option>
                        </optgroup>
                        <optgroup label="── 水墨 / 東方 ──">
                            <option value="雲煙青綠．逸境">雲煙青綠．逸境</option>
                            <option value="丹青入韻．青綠煙嵐">丹青入韻．青綠煙嵐</option>
                            <option value="清影幽篁．荷香弄墨">清影幽篁．荷香弄墨</option>
                            <option value="寂照．流沙意境">寂照．流沙意境</option>
                            <option value="煙波微茫．空靈無界">煙波微茫．空靈無界</option>
                        </optgroup>
                        <optgroup label="── 宇宙 / 幻象 ──">
                            <option value="星雲極晝．幽冥幻影">星雲極晝．幽冥幻影</option>
                            <option value="光影紀事．瞬間永恆">光影紀事．瞬間永恆</option>
                        </optgroup>
                        <optgroup label="── 醫療 ──">
                            <option value="醫療生技清透">醫療生技清透</option>
                        </optgroup>
                    </select>
                    <div class="風格預覽條" id="風格預覽條"></div>
                </div>
            </div>
        </div>

        <!-- 區塊二：簡報規格 -->
        <div class="表單卡片">
            <div class="區塊標題">簡報規格</div>
            <div class="四欄並列">
                <div>
                    <label>簡報類型</label>
                    <select id="簡報類型">
                        <option value="論文發表">論文發表</option>
                        <option value="學術專案報告">學術專案報告</option>
                        <option value="商業提案企劃">商業提案企劃</option>
                        <option value="期末成果展演">期末成果展演</option>
                        <option value="產品發表會">產品發表會</option>
                        <option value="專題研討會">專題研討會</option>
                        <option value="教育訓練課程">教育訓練課程</option>
                        <option value="專案進度匯報">專案進度匯報</option>
                    </select>
                </div>
                <div>
                    <label>報告場景</label>
                    <select id="報告場景">
                        <option value="大型會議室投影 (放大字級)">大型會議室投影（放大字級）</option>
                        <option value="小型會議室投影 (標準字級)">小型會議室投影（標準字級）</option>
                        <option value="教室投影 (高對比大字級)">教室投影（高對比大字級）</option>
                        <option value="演講廳大螢幕 (超大字級)">演講廳大螢幕（超大字級）</option>
                        <option value="線上視訊會議 (螢幕優化)">線上視訊會議（螢幕優化）</option>
                        <option value="行動裝置閱讀 (極簡排版)">行動裝置閱讀（極簡排版）</option>
                    </select>
                </div>
                <div>
                    <label>預計頁數 <span class="選填標記">(選填)</span></label>
                    <div class="數字容器">
                        <div class="數字控制組">
                            <button type="button" class="調整鈕" onclick="調整數值('簡報頁數',-1,1)" aria-label="減少頁數">−</button>

/* ===================================================
   風格自動判定
=================================================== */
function 自動演算風格判定(主題) {
    const 規則 = [
        { 詞:["安全","工安","風險"],        風格:"智慧科技藍工業安全" },
        { 詞:["金融","投資","策略","營運"],  風格:"金融科技信任" },
        { 詞:["學術","研究","文獻","論文"],  風格:"嚴謹學術期刊" },
        { 詞:["醫療","生技","健康"],         風格:"醫療生技清透" },
        { 詞:["藝術","人文","歷史","美學"],  風格:"時光燼卷．古韻滄桑" },
        { 詞:["數據","AI","智慧","科技"],    風格:"數據流光．智造核心" },
    ];
    for (let r of 規則) {
        if (r.詞.some(w => 主題.includes(w))) return r.風格;
    }
    return "3D 擬真沉浸渲染";
}

/* ===================================================
   取得主題色調
=================================================== */
function 獲取主題專屬色調(主題) {
    for (let 項目 of 色調對應表) {
        if (項目.關鍵字.some(詞 => 主題.includes(詞))) {
            return { 名稱: 項目.名稱, 色碼: 項目.色碼 };
        }
    }
    return { 名稱:"流沙金", 色碼:"#F6E05E" };
}

/* ===================================================
   組員雙列排版
=================================================== */
function 處理雙列組員排版() {
    const 有效名單 = Array.from(document.querySelectorAll(".組員輸入"))
        .map(el => el.value.trim()).filter(Boolean);
    let 輸出 = "";
    for (let i = 0; i < 有效名單.length; i += 2) {
        const 左 = 有效名單[i];
        const 右 = 有效名單[i+1] ?? "";
        輸出 += `    ${左.padEnd(18)}|    ${右}\n`;
    }
    return 輸出;
}

/* ===================================================
   複製功能
=================================================== */
function 複製生成內容() {
    const 內容 = document.getElementById("內容輸出區").textContent;
    const 複製鈕 = document.getElementById("複製按鈕鍵");

    navigator.clipboard.writeText(內容).then(() => {
        複製鈕.textContent = "✓ 已複製！";
        複製鈕.className = "功能鈕 複製 成功";
        顯示提示("已複製至剪貼簿，可直接貼入 NoteBook LM。", "成功");
        setTimeout(() => {
            複製鈕.textContent = "複製全文";
            複製鈕.className = "功能鈕 複製";
        }, 3000);
    }).catch(() => {
        顯示提示("無法存取剪貼簿，請手動全選複製（Ctrl+A）。", "錯誤");
    });
}

/* ===================================================
   下載功能
=================================================== */
function 下載提示詞() {
    const 內容 = document.getElementById("內容輸出區").textContent;
    if (!內容.trim()) { 顯示提示("請先生成提示詞再下載。", "錯誤"); return; }
    const 主題 = document.getElementById("輸入主題").value.trim() || "prompt";
    const 檔名 = `${主題.slice(0,20).replace(/\s+/g,"_")}_prompt.txt`;
    const blob = new Blob([內容], { type: "text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = 檔名;
    a.click();
    URL.revokeObjectURL(a.href);
    顯示提示(`已下載：${檔名}`, "成功");
}
