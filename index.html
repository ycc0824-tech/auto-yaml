<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteBook LM 簡報製作風格專用Prompt自動生成器</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background-color: #0D0E12; color: #E2E8F0; margin: 0; padding: 20px; }
        .主容器 { max-width: 1200px; margin: auto; background: #11141D; padding: 35px; border-radius: 16px; border: 1px solid #232936; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        h1 { color: #00E5FF; text-align: center; border-bottom: 2px solid #232936; padding-bottom: 15px; margin-bottom: 30px; letter-spacing: 1px; }
        
        .區域網格 { display: flex; flex-direction: column; gap: 20px; margin-bottom: 24px; }
        .表單卡片 { background: #1A202C; border: 1px solid #2D3748; border-radius: 12px; padding: 25px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .表單卡片:hover { border-color: #00E5FF; box-shadow: 0 6px 15px rgba(0,229,255,0.15); transform: translateY(-2px); }
        
        .內部並列 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .四欄並列 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .組員排版 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
        
        label { font-weight: bold; margin-bottom: 10px; display: block; color: #00E5FF; line-height: 1.4; font-size: 14px; }
        input[type="text"], select, textarea { width: 100%; padding: 12px; border: 1px solid #374151; border-radius: 8px; background-color: #0D0E12; color: #EDF2F7; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input[type="text"]:focus, select:focus, textarea:focus { outline: none; border-color: #00E5FF; box-shadow: 0 0 8px rgba(0,229,255,0.3); }
        textarea { height: 120px; resize: vertical; line-height: 1.6; }
        
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        .數字控制組 { display: flex; align-items: stretch; width: 100%; border: 1px solid #374151; border-radius: 8px; background-color: #0D0E12; overflow: hidden; height: 44px; }
        .數字控制組 input { border: none; border-radius: 0; text-align: center; font-size: 16px; font-weight: bold; color: #00E5FF; padding: 0; width: 100%; background: transparent; }
        .數字控制組 input:focus { outline: none; box-shadow: none; }
        .調整鈕 { background-color: #232936; color: #E2E8F0; border: none; width: 45px; font-size: 20px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; user-select: none; }
        .調整鈕:hover { background-color: #00E5FF; color: #0D0E12; }
        .單位標示 { align-self: center; color: #A0AEC0; margin-left: 10px; font-size: 14px; font-weight: bold; white-space: nowrap; }
        .數字容器 { display: flex; align-items: center; width: 100%; }

        .啟動按鈕 { width: 100%; padding: 18px; background: linear-gradient(135deg, #007BFF, #00E5FF); color: #0D0E12; border: none; border-radius: 10px; font-size: 20px; font-weight: bold; cursor: pointer; transition: 0.3s; letter-spacing: 2px; }
        .啟動按鈕:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,229,255,0.5); }
        
        .色調面板3D { margin-top: 20px; display: none; align-items: center; gap: 15px; background: #1A202C; padding: 20px; border-radius: 12px; border: 1px solid #2D3748; }
        .色調標題 { font-size: 18px; font-weight: bold; color: #E2E8F0; }
        .色調膠囊 { display: flex; align-items: center; gap: 12px; border: 1px solid #374151; border-radius: 25px; padding: 10px 24px; background: rgba(13, 14, 18, 0.8); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .發光圓點 { width: 16px; height: 16px; border-radius: 50%; }
        .色調文字 { font-size: 18px; font-weight: bold; color: #7DD3FC; letter-spacing: 1px; }

        .輸出包裹器 { position: relative; margin-top: 30px; display: none; }
        .內容輸出區 { background: #07080B; color: #A0AEC0; padding: 25px; border-radius: 12px; white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 15px; border: 1px solid #2D3748; line-height: 1.6; }
        .功能複製鈕 { position: absolute; top: 15px; right: 15px; padding: 10px 20px; background-color: #38A169; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .功能複製鈕:hover { background-color: #48BB78; }
        
        @media (max-width: 1024px) { 
            .四欄並列 { grid-template-columns: 1fr 1fr; gap: 20px; } 
            .組員排版 { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) { 
            .四欄並列, .內部並列 { grid-template-columns: 1fr; } 
            .組員排版 { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .組員排版 { grid-template-columns: 1fr; }
        }
    </style>
</head>

        let 新數值 = 目前數值 + 變更量;

            輸入框.value = 新數值;
        }

                return { 名稱: 項目.名稱, 色碼: 項目.色碼 };
            }
        }
        
        // 2. 若字典未涵蓋，啟動動態字串雜湊演算引擎 (String Hash Generator)
        let 數值 = 0;
        for (let 計數 = 0; 計數 < 主題.length; 計數++) {
            數值 = ((數值 << 5) - 數值) + 主題.charCodeAt(計數);
            數值 = 數值 & 數值; // 確保二進位長度一致
        }
        let 雜湊值 = Math.abs(數值);
        
        // 利用數學編碼，從前綴與後綴庫組合出無數種 3D 專屬名稱
        const 前綴庫 = ["量子", "幻影", "脈衝", "晶透", "深淵", "鈦金", "星雲", "矩陣", "核心", "流光", "次元", "極光", "暗物質", "超弦", "粒子", "重力", "虛空", "時空", "星塵", "光譜"];
        const 後綴庫 = ["藍", "銀", "紫", "青", "緋", "金", "翠", "鉑", "曜", "灰", "橙", "霓", "白", "黑", "赤", "褐", "靛", "碧", "紅", "綠"];
        
        let 前綴 = 前綴庫[雜湊值 % 前綴庫.length];
        let 後綴 = 後綴庫[(雜湊值 + 17) % 後綴庫.length];
        
        // 利用數學編碼算出 HSL 色相，產生高飽和度的發光色碼
        let 色相 = 雜湊值 % 360;
        let 動態色碼 = `hsl(${色相}, 100%, 65%)`; 
        
        return { 名稱: 前綴 + 後綴, 色碼: 動態色碼 }; 
    }

    function 處理雙列組員排版() {
        let 輸入組 = document.querySelectorAll(".組員輸入");
        let 有效名單 = Array.from(輸入組).map(單一框 => 單一框.value.trim()).filter(文字 => 文字 !== "");
        let 輸出文字 = "";
        
        for (let 計數 = 0; 計數 < 有效名單.length; 計數 += 2) {
            let 左邊 = 有效名單[計數];
            let 右邊 = (計數 + 1 < 有效名單.length) ? 有效名單[計數 + 1] : "";
            輸出文字 += `    ${左邊}    |    ${右邊}\n`;
        }
        return 輸出文字;
    }

    function 執行演算生成() {
        let 主題 = document.getElementById("輸入主題").value;
        let 風格選項 = document.getElementById("選擇風格").value;
        let 確定的風格 = 風格選項 === "自動判定" ? 自動演算風格判定(主題) : 風格選項;
        let 風格屬性 = 風格資料庫[確定的風格];
        
        let 類型 = document.getElementById("簡報類型").value;
        let 場景 = document.getElementById("報告場景").value;
        let 總頁數 = document.getElementById("簡報頁數").value;
        let 報告時間 = document.getElementById("報告時間").value;
        let 次標題 = document.getElementById("次標題").value;
        let 報告組別 = document.getElementById("報告組別").value;
        let 雙列排版結果 = 處理雙列組員排版();
        let 網頁填寫需求 = document.getElementById("客製化需求").value;
        let 格式化需求 = 網頁填寫需求.split('\n').map(段落 => `    ${段落}`).join('\n');

        let 主題色調資料 = 獲取主題專屬色調(主題);
        let 純淨色調 = 主題色調資料.名稱;
        let 預覽發光色 = 主題色調資料.色碼;
        
        document.getElementById("色調面板3D").style.display = "flex";
        document.getElementById("發光圓點").style.backgroundColor = 預覽發光色;
        document.getElementById("發光圓點").style.boxShadow = `0 0 12px ${預覽發光色}`;
        document.getElementById("色調文字").textContent = `專屬 ${純淨色調}調`;

        let 最高層級約束 = "";
        if (確定的風格.includes("3D") || 確定的風格.includes("渲染") || 確定的風格.includes("晶澈凝光") || 確定的風格.includes("等角") || 確定的風格.includes("智造核心")) {
            最高層級約束 = `\n# 最高層級 AI 內容生成約束\n內容生成約束:\n  主題連動強度: "絕對強烈"\n  物件轉化規則: "強制將每一頁的『核心主題』或『數據標的』，實體化為高精度的 3D 立體物件"\n  特效生成規則: "所有環境光照、粒子特效與相機景深，必須與該 3D 物件的物理特性直接連動，嚴禁使用無關的裝飾性特效"\n\n==========================================\n`;
        }

        let 標記語言結果 = `# 視覺主題: ${確定的風格}

簡報基本設定:
  簡報主題: "${主題}"
  次標題: "${次標題}"
  報告組別: "${報告組別}"
  小組成員: |
${雙列排版結果}  簡報類型: "${類型}"
  預計頁數: "${總頁數} 頁"
  報告時間: "${報告時間} 分鐘"
  報告場景: "${場景}"
  輸出格式限制: "強制使用繁體中文 (台灣, UTF-8)"
  特殊客製化需求: |
${格式化需求}

AI防破圖字體排版規範 (1920x1080 基準):
  字體族群: "強制鎖定無襯線體 (微軟正黑體 / 思源黑體)"
  大標題: "100px 至 140px (首頁主標題，視覺張力極限，確保筆畫不沾黏)"
  次標題: "72px 至 90px (章節名稱 / 單頁主旨)"
  次次標題: "48px 至 60px (圖表標籤 / 段落重點)"
  標準內文: "36px 至 44px (防破圖絕對防線)"
  排版鐵律: "全畫面最小字體極限為 36 像素，資訊必須極簡化。絕對嚴禁將視覺風格名稱或色調當作文字列印在簡報畫面上！"

==========================================
${最高層級約束}
全體設計設定:
  視覺氛圍:
    - "${風格屬性[0]}"
    - "${風格屬性[1]}"
  色彩策略:
    背景色: "${風格屬性[2]}"
    主色調: "${風格屬性[3]}"
    輔助色: "${風格屬性[4]}"
    文字色: "${風格屬性[5]}"
  質感處理:
    - "${風格屬性[6]}"
    - "${風格屬性[7]}"
  文字排版:
    標題字體: "${風格屬性[8]}"
    內文字體: "${風格屬性[9]}"
    排版規則: "${風格屬性[10]}"
  版面配置:
    - "${風格屬性[11]}"
    - "${風格屬性[12]}"

==========================================
AI_繪圖提示詞:
  - "畫一張海報，文字內容為『${主題}』。全畫面最小字體極限為 36 像素，資訊必須極簡化，嚴禁出現低於此尺寸的細微文字。絕對嚴禁將視覺風格名稱當作文字印出。強制鎖定使用無襯線的微軟正黑體/思源黑體，請務必保持繁體中文字體筆畫的高度精確 (Maintain high-precision strokes for Traditional Chinese characters)，採用「${確定的風格}」視覺風格，搭配專屬${純淨色調}調的光影渲染，超高畫質 8K 解析度。"`;

        let 輸出包裹器 = document.getElementById("輸出包裹器");
        let 內容區 = document.getElementById("內容輸出區");
        let 複製鈕 = document.getElementById("複製按鈕鍵");
        
        輸出包裹器.style.display = "block";
        內容區.textContent = 標記語言結果;
        複製鈕.textContent = "一鍵複製";
        複製鈕.style.backgroundColor = "#38A169";
    }

    function 複製生成內容() {
        let 內容區 = document.getElementById("內容輸出區");
        let 複製鈕 = document.getElementById("複製按鈕鍵");
        
        navigator.clipboard.writeText(內容區.textContent).then(() => {
            複製鈕.textContent = "複製成功！";
            複製鈕.style.backgroundColor = "#3182CE";
            
            setTimeout(() => {
                複製鈕.textContent = "一鍵複製";
                複製鈕.style.backgroundColor = "#38A169";
            }, 3000);
        }).catch(() => {
            alert("複製遭遇錯誤，請手動全選文字進行複製。");
        });
    }
</script>
