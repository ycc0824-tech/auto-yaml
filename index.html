<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteBook LM 自動化風格判定與 YAML 生成引擎</title>
    <style>
        /* ══ 設計令牌 ══ */
        :root {
            --bg:        #0D0E12;
            --bg-card:   #1A202C;
            --bg-deep:   #0D0E12;
            --surface:   #11141D;
            --border:    #2D3748;
            --border-d:  #232936;
            --accent:    #00E5FF;
            --accent2:   #007BFF;
            --text:      #E2E8F0;
            --text-sub:  #A0AEC0;
            --text-in:   #EDF2F7;
            --success:   #38A169;
            --success-h: #48BB78;
            --warn:      #F6AD55;
            --radius:    10px;
            --radius-lg: 14px;
            --shadow:    0 4px 12px rgba(0,0,0,0.35);
            --glow:      0 0 10px rgba(0,229,255,0.25);
            --trans:     0.25s ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px 16px 56px;
            min-height: 100vh;
        }

        /* ── 主容器 ── */
        .主容器 {
            max-width: 1200px;
            margin: auto;
            background: var(--surface);
            padding: 36px 40px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-d);
            box-shadow: 0 12px 48px rgba(0,0,0,0.75);
        }

        /* ── 頁首 ── */
        .頁首 { text-align: center; margin-bottom: 32px; }
        .頁首 h1 {
            color: var(--accent);
            font-size: clamp(17px, 2.2vw, 24px);
            letter-spacing: 1.5px;
            padding-bottom: 16px;
            border-bottom: 1.5px solid var(--border-d);
            text-shadow: 0 0 24px rgba(0,229,255,0.35);
        }
        .頁首 .副標 { margin-top: 8px; font-size: 13px; color: var(--text-sub); }
        .徽章 {
            display: inline-block;
            background: rgba(0,229,255,0.08);
            border: 1px solid rgba(0,229,255,0.25);
            color: var(--accent);
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 20px;
            margin-left: 8px;
            vertical-align: middle;
        }

        /* ── 區域佈局 ── */
        .區域網格 { display: flex; flex-direction: column; gap: 18px; margin-bottom: 20px; }
        .兩欄並列 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .四欄並列 { display: grid; grid-template-columns: repeat(4,1fr); gap: 18px; }
        .組員排版 { display: grid; grid-template-columns: repeat(6,1fr); gap: 10px; margin-top: 12px; }

        /* ── 表單卡片 ── */
        .表單卡片 {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 22px 24px;
            transition: border-color var(--trans), box-shadow var(--trans), transform var(--trans);
            box-shadow: var(--shadow);
        }
        .表單卡片:hover {
            border-color: var(--accent);
            box-shadow: 0 6px 20px rgba(0,229,255,0.12);
            transform: translateY(-2px);
        }

        /* ── 區塊標題 ── */
        .區塊標題 {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            color: var(--text-sub);
            text-transform: uppercase;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-d);
        }

        /* ── 標籤 ── */
        label {
            display: block;
            font-weight: bold;
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .選填標記 { font-size: 11px; font-weight: normal; color: var(--text-sub); margin-left: 4px; }

        /* ── 輸入元件 ── */
        input[type="text"], select, textarea {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #374151;
            border-radius: 8px;
            background: var(--bg-deep);
            color: var(--text-in);
            font-size: 14px;
            font-family: inherit;
            transition: border-color var(--trans), box-shadow var(--trans);
        }
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: var(--glow);
        }
        textarea { height: 130px; resize: vertical; line-height: 1.7; }

        /* ── 步進器 ── */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
        input[type="number"] { -moz-appearance: textfield; }

        .數字容器 { display: flex; align-items: center; gap: 10px; }
        .數字控制組 {
            display: flex; align-items: stretch; flex: 1;
            border: 1px solid #374151; border-radius: 8px;
            background: var(--bg-deep); overflow: hidden; height: 44px;
            transition: border-color var(--trans);
        }
        .數字控制組:focus-within { border-color: var(--accent); box-shadow: var(--glow); }
        .數字控制組 input {
            border: none; border-radius: 0; text-align: center;
            font-size: 16px; font-weight: bold; color: var(--accent);
            padding: 0; background: transparent; width: 100%;
        }
        .數字控制組 input:focus { outline: none; box-shadow: none; }
        .調整鈕 {
            background: #232936; color: var(--text); border: none;
            width: 42px; font-size: 18px; cursor: pointer;
            transition: background var(--trans), color var(--trans);
            display: flex; align-items: center; justify-content: center;
            user-select: none; flex-shrink: 0;
        }
        .調整鈕:hover { background: var(--accent); color: var(--bg); }
        .單位標示 { color: var(--text-sub); font-size: 13px; font-weight: bold; white-space: nowrap; }

        /* ── 即時色調預覽條 ── */
        .色調預覽列 {
            display: flex; align-items: center; gap: 12px;
            background: rgba(0,229,255,0.03);
            border: 1px solid rgba(0,229,255,0.12);
            border-radius: var(--radius); padding: 14px 18px;
            margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
        }
        .色調預覽標題 { font-size: 13px; color: var(--text); white-space: nowrap; }
        .色調膠囊 {
            display: flex; align-items: center; gap: 10px;
            border: 1px solid #374151; border-radius: 25px;
            padding: 8px 20px 8px 12px; background: rgba(13,14,18,0.8);
        }
        .發光圓點 {
            width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0;
            transition: background-color 0.4s, box-shadow 0.4s;
        }
        .色調文字 {
            font-size: 15px; font-weight: bold; color: #7DD3FC;
            letter-spacing: 1px; transition: color 0.3s;
        }
        .色碼標籤 {
            margin-left: auto; font-size: 11px; font-family: 'Consolas', monospace;
            color: var(--text-sub); background: rgba(0,0,0,0.3);
            padding: 3px 10px; border-radius: 20px; letter-spacing: 1px;
        }
        /* 比對來源標籤 */
        .比對來源 {
            font-size: 11px; color: #68D391; background: rgba(56,161,105,0.1);
            border: 1px solid rgba(56,161,105,0.25); border-radius: 12px;
            padding: 2px 10px; white-space: nowrap;
        }
        .比對來源.雜湊 {
            color: var(--warn); background: rgba(246,173,85,0.08);
            border-color: rgba(246,173,85,0.25);
        }

        /* ── 風格標籤預覽 ── */
        .風格預覽條 {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            margin-bottom: 10px; padding: 10px 14px;
            background: rgba(0,229,255,0.04); border: 1px dashed rgba(0,229,255,0.18);
            border-radius: 8px; font-size: 13px;
        }
        .風格預覽條 .標籤 { color: var(--text-sub); }
        .風格預覽條 .值 { color: var(--accent); font-weight: bold; }

        /* ── 組員管理 ── */
        .組員管理列 { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

        /* ── 啟動按鈕 ── */
        .啟動按鈕 {
            width: 100%; padding: 17px;
            background: linear-gradient(135deg, var(--accent2), var(--accent));
            color: var(--bg); border: none; border-radius: var(--radius);
            font-size: 18px; font-weight: bold; cursor: pointer;
            transition: transform var(--trans), box-shadow var(--trans);
            letter-spacing: 2px;
        }
        .啟動按鈕:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,229,255,0.45); }
        .啟動按鈕:active { transform: translateY(0); }

        /* ── 進度條 ── */
        @keyframes sweep { 0%{left:-40%;width:40%} 100%{left:100%;width:40%} }
        .進度條包裹 { height: 3px; background: var(--border-d); border-radius: 3px; overflow: hidden; display: none; margin-bottom: 2px; }
        .進度條包裹.活躍 { display: block; }
        .進度條指示 { position: relative; height: 100%; background: linear-gradient(90deg,transparent,var(--accent),transparent); animation: sweep 1.1s ease-in-out infinite; }

        /* ── 輸出區 ── */
        .輸出包裹器 { display: none; position: relative; margin-top: 28px; }
        .輸出包裹器.顯示 { display: block; }
        .輸出工具列 {
            display: flex; align-items: center; justify-content: space-between;
            background: #0a0b0e; border: 1px solid var(--border);
            border-bottom: none; border-radius: var(--radius) var(--radius) 0 0;
            padding: 10px 16px; flex-wrap: wrap; gap: 8px;
        }
        .工具列左 { display: flex; align-items: center; gap: 8px; }
        .端點列 { display: flex; gap: 5px; }
        .端點 { width: 11px; height: 11px; border-radius: 50%; }
        .輸出標題 { font-size: 13px; color: var(--accent); font-weight: bold; letter-spacing: 0.5px; }
        .工具列右 { display: flex; align-items: center; gap: 8px; }
        .字數標示 { font-size: 12px; color: var(--text-sub); }

        .功能鈕 {
            padding: 7px 16px; border: 1px solid var(--border);
            border-radius: 6px; font-size: 13px; font-weight: bold;
            cursor: pointer; transition: all var(--trans);
            background: var(--bg-card); color: var(--text); font-family: inherit;
        }
        .功能鈕:hover { border-color: var(--accent); color: var(--accent); }
        .功能鈕.複製 { background: var(--success); border-color: var(--success); color: #fff; }
        .功能鈕.複製:hover { background: var(--success-h); }
        .功能鈕.複製.成功 { background: var(--accent2); border-color: var(--accent2); }

        .內容輸出區 {
            background: #07080B; color: #A0AEC0;
            padding: 22px 26px; border-radius: 0 0 var(--radius) var(--radius);
            white-space: pre-wrap; font-family: 'Consolas', 'Cascadia Code', monospace;
            font-size: 14px; border: 1px solid var(--border); line-height: 1.65;
            max-height: 640px; overflow-y: auto;
        }
        .內容輸出區::-webkit-scrollbar { width: 6px; }
        .內容輸出區::-webkit-scrollbar-track { background: transparent; }
        .內容輸出區::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

        /* ── Toast ── */
        .toast {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%) translateY(16px);
            background: var(--bg-card); border: 1px solid var(--accent);
            color: var(--text); padding: 11px 22px; border-radius: var(--radius);
            font-size: 14px; z-index: 9999; opacity: 0;
            transition: opacity 0.3s, transform 0.3s; pointer-events: none;
            white-space: nowrap;
        }
        .toast.顯示 { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.錯誤 { border-color: #E53E3E; color: #FC8181; }

        /* ── RWD ── */
        @media (max-width: 1024px) {
            .主容器 { padding: 28px 24px; }
            .四欄並列 { grid-template-columns: 1fr 1fr; }
            .組員排版 { grid-template-columns: repeat(3,1fr); }
        }
        @media (max-width: 768px) {
            .主容器 { padding: 20px 16px; }
            .四欄並列, .兩欄並列 { grid-template-columns: 1fr; }
            .組員排版 { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .組員排版 { grid-template-columns: 1fr; }
            .輸出工具列 { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="主容器">

    <div class="頁首">
        <h1>NoteBook LM 自動化風格判定與 YAML 生成引擎 <span class="徽章">v3.0</span></h1>
        <div class="副標">148 組產業關鍵字字典 × 動態雜湊色調演算 × 26 種視覺風格 × 即時預覽</div>
    </div>

    <div class="區域網格">

        <!-- 區塊一：主題 & 風格 -->
        <div class="表單卡片">
            <div class="區塊標題">核心設定</div>

            <!-- 即時色調預覽列 -->
            <div class="色調預覽列" id="色調預覽列">
                <span class="色調預覽標題">主題專屬色調：</span>
                <div class="色調膠囊">
                    <div class="發光圓點" id="發光圓點"></div>
                    <div class="色調文字" id="色調文字">輸入主題後自動演算</div>
                </div>
                <span class="色碼標籤" id="色碼標籤">---</span>
                <span class="比對來源" id="比對來源標籤" style="display:none;"></span>
            </div>

            <!-- 風格預覽 -->
            <div class="風格預覽條" id="風格預覽條">
                <span class="標籤">自動判定結果：</span>
                <span class="值" id="風格預覽值">等待輸入主題...</span>
            </div>

            <div class="兩欄並列">
                <div>
                    <label>報告核心主題 <span class="選填標記">(輸入後即時演算色調)</span></label>
                    <input type="text" id="輸入主題"
                           value="智慧科技導入與營運策略報告"
                           oninput="即時演算預覽()"
                           placeholder="輸入主題，系統自動比對 148 組關鍵字">
                </div>
                <div>
                    <label>視覺風格</label>
                    <select id="選擇風格" onchange="即時演算預覽()">
                        <option value="自動判定">🤖 自動判別（依主題關鍵字，未匹配套用 3D 擬真沉浸渲染）</option>
                        <optgroup label="── 商業 / 科技 ──">
                            <option value="金融科技信任">金融科技信任</option>
                            <option value="現代菁英商務">現代菁英商務</option>
                            <option value="暗黑霓虹科技">暗黑霓虹科技</option>
                            <option value="智慧科技藍工業安全">智慧科技藍工業安全</option>
                            <option value="數據流光．智造核心">數據流光．智造核心</option>
                        </optgroup>
                        <optgroup label="── 3D / 電影 ──">
                            <option value="3D 擬真沉浸渲染">3D 擬真沉浸渲染</option>
                            <option value="3D 等角微縮幾何">3D 等角微縮幾何</option>
                            <option value="3D 立體擬真電影">3D 立體擬真電影</option>
                            <option value="晶澈凝光．幻境稜鏡">晶澈凝光．幻境稜鏡</option>
                        </optgroup>
                        <optgroup label="── 藝術 / 人文 ──">
                            <option value="溫暖大地人文">溫暖大地人文</option>
                            <option value="嚴謹學術期刊">嚴謹學術期刊</option>
                            <option value="復古打字機報紙">復古打字機報紙</option>
                            <option value="莫蘭迪藝術策展">莫蘭迪藝術策展</option>
                            <option value="普普藝術漫畫">普普藝術漫畫</option>
                            <option value="千禧 Y2K 潮流">千禧 Y2K 潮流</option>
                            <option value="黑曜鎏金．尊榮典藏">黑曜鎏金．尊榮典藏</option>
                            <option value="時光燼卷．古韻滄桑">時光燼卷．古韻滄桑</option>
                        </optgroup>
                        <optgroup label="── 水墨 / 東方 ──">
                            <option value="雲煙青綠．逸境">雲煙青綠．逸境</option>
                            <option value="丹青入韻．青綠煙嵐">丹青入韻．青綠煙嵐</option>
                            <option value="清影幽篁．荷香弄墨">清影幽篁．荷香弄墨</option>
                            <option value="寂照．流沙意境">寂照．流沙意境</option>
                            <option value="煙波微茫．空靈無界">煙波微茫．空靈無界</option>
                        </optgroup>
                        <optgroup label="── 宇宙 / 幻象 ──">
                            <option value="星雲極晝．幽冥幻影">星雲極晝．幽冥幻影</option>
                            <option value="光影紀事．瞬間永恆">光影紀事．瞬間永恆</option>
                        </optgroup>
                        <optgroup label="── 醫療 ──">
                            <option value="醫療生技清透">醫療生技清透</option>
                        </optgroup>
                    </select>
                </div>
            </div>
        </div>

        <!-- 區塊二：簡報規格 -->
        <div class="表單卡片">
            <div class="區塊標題">簡報規格</div>
            <div class="四欄並列">
                <div>
                    <label>簡報類型</label>
                    <select id="簡報類型">
                        <option value="論文發表" selected>論文發表</option>
                        <option value="學術專案報告">學術專案報告</option>
                        <option value="商業提案企劃">商業提案企劃</option>
                        <option value="期末成果展演">期末成果展演</option>
                        <option value="產品發表會">產品發表會</option>
                        <option value="專題研討會">專題研討會</option>
                        <option value="教育訓練課程">教育訓練課程</option>
                        <option value="專案進度匯報">專案進度匯報</option>
                    </select>
                </div>
                <div>
                    <label>報告場景</label>
                    <select id="報告場景">
                        <option value="大型會議室投影（放大字級）" selected>大型會議室投影（放大字級）</option>
                        <option value="小型會議室投影（標準字級）">小型會議室投影（標準字級）</option>
                        <option value="教室投影（高對比大字級）">教室投影（高對比大字級）</option>
                        <option value="演講廳大螢幕（超大字級）">演講廳大螢幕（超大字級）</option>
                        <option value="線上視訊會議（螢幕優化）">線上視訊會議（螢幕優化）</option>
                        <option value="行動裝置閱讀（極簡排版）">行動裝置閱讀（極簡排版）</option>
                    </select>
                </div>
                <div>
                    <label>預計頁數 <span class="選填標記">(選填)</span></label>
                    <div class="數字容器">
                        <div class="數字控制組">
                            <button type="button" class="調整鈕" onclick="調整數值('簡報頁數',-1,1)">−</button>
                            <input type="number" id="簡報頁數" value="20" min="1">
                            <button type="button" class="調整鈕" onclick="調整數值('簡報頁數',1,1)">+</button>
                        </div>
                        <span class="單位標示">頁</span>
                    </div>
                </div>
                <div>
                    <label>報告時間 <span class="選填標記">(選填)</span></label>
                    <div class="數字容器">
                        <div class="數字控制組">
                            <button type="button" class="調整鈕" onclick="調整數值('報告時間',-5,5)">−</button>
                            <input type="number" id="報告時間" value="40" min="5" step="5">
                            <button type="button" class="調整鈕" onclick="調整數值('報告時間',5,5)">+</button>
                        </div>
                        <span class="單位標示">分鐘</span>
                    </div>
                </div>
            </div>

/* ════════════════════════════════════════════════════
   動態雜湊演算備援引擎
════════════════════════════════════════════════════ */
const 前綴庫 = ["量子","幻影","脈衝","晶透","深淵","鈦金","星雲","矩陣","核心","流光","次元","極光","暗物質","超弦","粒子","重力","虛空","時空","星塵","光譜"];
const 後綴庫 = ["藍","銀","紫","青","緋","金","翠","鉑","曜","灰","橙","霓","白","黑","赤","褐","靛","碧","紅","綠"];

function 動態雜湊演算(主題) {
    let 數值 = 0;
    for (let i = 0; i < 主題.length; i++) {
        數值 = ((數值 << 5) - 數值) + 主題.charCodeAt(i);
        數值 = 數值 & 數值;
    }
    const 雜湊值 = Math.abs(數值);
    const 前綴 = 前綴庫[雜湊值 % 前綴庫.length];
    const 後綴 = 後綴庫[(雜湊值 + 17) % 後綴庫.length];
    const 色相  = 雜湊值 % 360;
    const 色碼  = `hsl(${色相},90%,60%)`;
    return { 名稱: 前綴 + 後綴, 色碼, 來源: "雜湊演算" };
}

/* ════════════════════════════════════════════════════
   主題色調查詢（字典優先 → 雜湊備援）
════════════════════════════════════════════════════ */
function 獲取主題專屬色調(主題) {
    if (!主題 || !主題.trim()) 主題 = "未命名報告";
    for (const 項目 of 色調對應表) {
        const 命中詞 = 項目.關鍵字.find(詞 => 主題.includes(詞));
        if (命中詞) return { 名稱: 項目.名稱, 色碼: 項目.色碼, 來源: `字典比對：「${命中詞}」` };
    }
    return 動態雜湊演算(主題);
}

function 自動演算風格判定(主題) {
    const 規則 = [
        { 詞:["安全","工安","風險","防護"],             風格:"智慧科技藍工業安全" },
        { 詞:["金融","投資","策略","營運","財務"],       風格:"金融科技信任" },
        { 詞:["學術","研究","文獻","論文","期刊"],       風格:"嚴謹學術期刊" },
        { 詞:["醫療","生技","健康","照護"],              風格:"醫療生技清透" },
        { 詞:["藝術","人文","歷史","文化","美學"],       風格:"時光燼卷．古韻滄桑" },
        { 詞:["大數據","AI","機器學習","深度學習"],      風格:"數據流光．智造核心" },
        { 詞:["量子","太空","衛星","星際"],              風格:"星雲極晝．幽冥幻影" },
        { 詞:["區塊鏈","加密","元宇宙","VR"],           風格:"暗黑霓虹科技" },
    ];
    for (const r of 規則) {
        if (r.詞.some(w => 主題.includes(w))) return r.風格;
    }
    return "3D 擬真沉浸渲染";
}

function _執行即時預覽() {
    const 主題     = document.getElementById("輸入主題").value.trim();
    const 風格選項 = document.getElementById("選擇風格").value;

    // 色調預覽
    if (主題) {
        const 色調 = 獲取主題專屬色調(主題);
        const 圓點 = document.getElementById("發光圓點");
        圓點.style.backgroundColor = 色調.色碼;
        圓點.style.boxShadow = `0 0 14px ${色調.色碼}`;
        document.getElementById("色調文字").textContent = `專屬 ${色調.名稱} 調`;
        document.getElementById("色碼標籤").textContent = 色調.色碼.startsWith("hsl") ? "動態色" : 色調.色碼;

        const 來源標籤 = document.getElementById("比對來源標籤");
        來源標籤.style.display = "inline";
        來源標籤.textContent = 色調.來源;
        來源標籤.className = "比對來源" + (色調.來源 === "雜湊演算" ? " 雜湊" : "");
    }

    // 自動風格預覽
    const 確定風格 = 風格選項 === "自動判定"
        ? `${自動演算風格判定(主題)}（自動判定）`
        : 風格選項;
    document.getElementById("風格預覽值").textContent = 確定風格 || "等待輸入主題...";
}

function 調整數值(元素ID, 變更量, 最小值) {
    const el = document.getElementById(元素ID);
    const 新值 = (parseInt(el.value) || 0) + 變更量;
    if (新值 >= 最小值) el.value = 新值;
}

/* ════════════════════════════════════════════════════
   組員雙欄排版
════════════════════════════════════════════════════ */
function 處理雙列組員排版() {
    const 有效名單 = Array.from(document.querySelectorAll(".組員輸入"))
        .map(el => el.value.trim()).filter(Boolean);
    let 輸出 = "";
    for (let i = 0; i < 有效名單.length; i += 2) {
        const 左 = 有效名單[i];
        const 右 = 有效名單[i+1] ?? "";
        輸出 += `    ${左.padEnd(20)}${右}\n`;
    }
    return 輸出;
}

/* ════════════════════════════════════════════════════
   複製 / 下載
════════════════════════════════════════════════════ */
function 複製生成內容() {
    const 內容 = document.getElementById("內容輸出區").textContent;
    const 複製鈕 = document.getElementById("複製按鈕鍵");
    if (!內容.trim()) { showToast("請先生成提示詞", true); return; }

    navigator.clipboard.writeText(內容).then(() => {
        複製鈕.textContent = "✓ 已複製！";
        複製鈕.classList.add("成功");
        showToast("已複製至剪貼簿，可直接貼入 NoteBook LM");
        clearTimeout(複製鈕._t);
        複製鈕._t = setTimeout(() => {
            複製鈕.textContent = "複製全文";
            複製鈕.classList.remove("成功");
        }, 2800);
    }).catch(() => showToast("請手動全選複製（Ctrl+A）", true));
}

function 下載提示詞() {
    const 內容 = document.getElementById("內容輸出區").textContent;
    if (!內容.trim()) { showToast("請先生成提示詞", true); return; }
    const 主題 = (document.getElementById("輸入主題").value.trim() || "prompt").slice(0,20).replace(/\s+/g,"_");
    const blob = new Blob([內容], { type:"text/plain;charset=utf-8" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = `${主題}_prompt.yaml`; a.click();
    URL.revokeObjectURL(a.href);
    showToast(`已下載：${主題}_prompt.yaml`);
}

/* ════════════════════════════════════════════════════
   Toast
════════════════════════════════════════════════════ */
let _toastTimer = null;
function showToast(msg, isErr = false) {
    const el = document.getElementById("toast");
    el.textContent = (isErr ? "⚠ " : "✓ ") + msg;
    el.className = "toast" + (isErr ? " 錯誤" : "") + " 顯示";
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove("顯示"), 2800);
}
